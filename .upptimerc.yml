owner: basedalgerianrin
repo: status

sites:
  - name: Alsatorix API
    url: https://www.alsatorix.com/health
    # Marked DOWN if the health endpoint stops returning "ok" — catches a broken
    # app even when the server itself still answers (same logic as the UptimeRobot
    # keyword monitor).
    __dangerous__body_down_if_text_missing: "ok"
  - name: Alsatorix Website
    url: https://www.alsatorix.com

status-website:
  cname: status.alsatorix.com
  logoUrl: https://www.alsatorix.com/logo.svg
  name: Alsatorix Status
  introTitle: "Alsatorix — System Status"
  introMessage: Live status and uptime history for Alsatorix services. If you are experiencing an issue that is not shown here, please contact us at sami@alsatorix.com.
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://www.alsatorix.com
